<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workout Tracker Pro</title>
    <style>
        :root { 
            --primary: #0984e3; --secondary: #00b894; --bg: #f0f2f5; 
            --sidebar-bg: #ffffff; --text: #2d3436; --accent: #6c5ce7;
            --skip: #f39c12; 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: 320px; background: var(--sidebar-bg); border-right: 1px solid #dfe6e9;
            display: flex; flex-direction: column; transition: 0.3s ease; z-index: 10;
        }
        .sidebar-header { padding: 20px; font-weight: bold; font-size: 1.1em; border-bottom: 1px solid #eee; background: #fafafa; }
        #liste-programmes { flex-grow: 1; overflow-y: auto; padding: 12px; }
        
        .section-title { font-size: 0.75em; font-weight: 800; color: #b2bec3; text-transform: uppercase; letter-spacing: 1px; margin: 15px 0 8px 5px; }

        .prog-card { padding: 16px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; background: #f8fafc; border: 1px solid #edf2f7; position: relative; }
        .prog-card.today { border: 2px solid var(--accent); background: linear-gradient(145deg, #ffffff, #f3f0ff); }
        .prog-card.active { border-color: var(--primary); background: #e1f5fe; }
        .badge-today { background: var(--accent); color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.7em; float: right; }
        /* Nouveau badge pour l'état complété */
        .badge-done { background: var(--secondary); color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.7em; float: right; margin-left: 5px; }
        
        .prog-name { display: block; font-weight: 600; margin-bottom: 4px; }
        .prog-meta { font-size: 0.75em; color: #718096; }

        .hist-item { padding: 10px; background: #fff; border: 1px solid #eee; border-radius: 8px; margin-bottom: 8px; font-size: 0.8em; position: relative; transition: 0.2s; }
        .hist-item:hover { background: #f8fafc; }

        /* --- ZONE PRINCIPALE --- */
        .main-content { flex-grow: 1; overflow-y: auto; position: relative; display: flex; flex-direction: column; }
        .top-bar-mobile { display: none; padding: 15px; background: white; border-bottom: 1px solid #eee; align-items: center; gap: 10px; }

        .container-fluid { padding: 20px; max-width: 600px; margin: auto; width: 100%; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }

        .exo-row-summary { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .exo-row-summary:last-child { border-bottom: none; }
        .exo-info-main { display: flex; flex-direction: column; }
        .exo-details-tags { display: flex; gap: 5px; margin-top: 5px; }
        .tag { font-size: 0.7em; font-weight: 700; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
        .tag-rest { background: #e8f8f5; color: var(--secondary); }
        .tag-work { background: #e1f5fe; color: var(--primary); }
        .serie-detail-row { display: flex; justify-content: space-between; font-size: 0.85em; color: #4a5568; background: #f7fafc; padding: 4px 8px; border-radius: 4px; margin-top: 2px; border-left: 2px solid #cbd5e0; }

        .btn { padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 0.9em; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; flex: 1; } 
        .btn-secondary { background: var(--secondary); color: white; width: 100%; }
        .btn-nav { background: #eee; color: var(--text); padding: 16px 20px; }
        .btn-skip { background: var(--skip); color: white; flex: 1; }

        .progress-bar { height: 6px; background: #e2e8f0; border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--secondary); width: 0%; transition: 0.4s; }

        @media (max-width: 768px) {
            .sidebar { position: absolute; width: 100%; height: 100%; left: 0; }
            .sidebar.hidden { transform: translateX(-100%); }
            .top-bar-mobile { display: flex; }
        }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #2d3436; color: white; padding: 10px 25px; border-radius: 30px; font-size: 0.8em; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 100; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">🏋️ Dashboard Séance</div>
    <div id="liste-programmes">
        <div class="section-title">Aujourd'hui</div>
        <div id="container-today"></div>
        <div class="section-title">Autres Programmes</div>
        <div id="container-others"></div>
        <div class="section-title">Historique Récent</div>
        <div id="container-history"></div>
    </div>
</div>

<div class="main-content">
    <div class="top-bar-mobile">
        <button onclick="toggleSidebar(true)" style="background:none; border:none; font-size: 1.5em;">☰</button>
        <span id="mobile-title" style="font-weight:bold;">Sélectionner</span>
    </div>

    <div id="empty-state" style="text-align: center; padding: 100px 20px; color: #b2bec3;">
        <div style="font-size: 4em;">💪</div>
        <h2>C'est l'heure !</h2>
        <p>Choisis ton programme à gauche.</p>
    </div>

    <div id="overview-screen" class="container-fluid" style="display: none;">
        <div class="card">
            <h2 id="overview-title" style="margin-top:0; color: var(--primary);">---</h2>
            <div id="exercise-list-summary" style="margin-bottom: 25px;"></div>
            <button class="btn btn-primary" id="btn-start-workout" style="width: 100%;" onclick="demarrerEntrainement()">COMMENCER LA SÉANCE</button>
        </div>
    </div>

    <div id="workout-view" class="container-fluid" style="display: none;">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="workout-card-container" class="card">
            <h2 id="display-nom" style="margin:0; color:var(--primary);">---</h2>
            <div style="display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 20px 0;">
                <span id="display-sub" style="color:#a0aec0; text-transform:uppercase; font-size:0.75em; font-weight: 600;"></span>
                <span id="display-rest-active" style="color:var(--secondary); background:#e8f8f5; padding: 2px 10px; border-radius: 20px; font-size:0.75em; font-weight: bold; border: 1px solid #b2dfdb;"></span>
            </div>
            <div id="series-container" style="margin: 20px 0;"></div>
            <input type="text" id="inp-note" class="note-input" placeholder="Note ou feeling sur cet exo...">
            <div style="display:flex; gap:10px;">
                <button class="btn btn-nav" id="btn-precedent">←</button>
                <button class="btn btn-skip" id="btn-passer">Passer ⏭️</button>
                <button class="btn btn-primary" id="btn-suivant">Suivant →</button>
            </div>
            <button class="btn btn-secondary" id="btn-terminer" style="display:none; margin-top:10px;">TERMINER LA SÉANCE ✅</button>
        </div>
    </div>
</div>

<div id="toast">Données synchronisées</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, getDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCOWw7rzc3GjVFNz_dqVjAxn-vbBTV98L8",
        authDomain: "suivisport2026.firebaseapp.com",
        projectId: "suivisport2026",
        appId: "1:858262569030:web:6c7542a7fc9542aa3b8a47"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentProg = null;
    let currentIndex = 0;
    window.historiqueData = [];

    function getFrenchDay() {
        return ['Dimanche', 'Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi'][new Date().getDay()];
    }

    async function chargerSidebar() {
        const todayStr = getFrenchDay();
        const dateAuj = new Date().toLocaleDateString('fr-FR');
        
        // 1. Charger d'abord l'historique pour savoir ce qui est fait
        const histSnap = await getDocs(collection(db, "historique_seances"));
        window.historiqueData = histSnap.docs.map(d => ({id: d.id, ...d.data()}))
                                    .sort((a, b) => new Date(b.date) - new Date(a.date));

        // Identifier les noms des programmes faits aujourd'hui
        const programmesFaitsAujourdhui = window.historiqueData
            .filter(h => new Date(h.date).toLocaleDateString('fr-FR') === dateAuj)
            .map(h => h.nomProgramme);

        // 2. Charger les programmes
        const snap = await getDocs(collection(db, "programmes"));
        const contToday = document.getElementById('container-today');
        const contOthers = document.getElementById('container-others');
        contToday.innerHTML = ""; contOthers.innerHTML = "";

        let hasToday = false;
        snap.forEach(d => {
            const p = d.data();
            const isToday = p.jours.includes(todayStr);
            const isDone = programmesFaitsAujourdhui.includes(p.nom);
            
            const card = document.createElement('div');
            card.className = `prog-card ${isToday ? 'today' : ''}`;
            card.innerHTML = `
                ${isDone ? '<span class="badge-done">COMPLÉTÉ ✅</span>' : (isToday ? '<span class="badge-today">AUJOURD\'HUI</span>' : '')}
                <span class="prog-name">${p.nom}</span>
                <span class="prog-meta">${p.exercices.length} exercices</span>
            `;
            card.onclick = () => selectProgram(d.id, card);
            if (isToday) { contToday.appendChild(card); hasToday = true; }
            else { contOthers.appendChild(card); }
        });
        
        if (!hasToday) contToday.innerHTML = "<p style='font-size:0.8em; color:#a0aec0; padding:10px;'>Repos aujourd'hui ! ☕</p>";
        
        renderHistoriqueUI(); // Mettre à jour la liste d'historique en bas
    }

    function renderHistoriqueUI() {
        const contHistory = document.getElementById('container-history');
        contHistory.innerHTML = window.historiqueData.slice(0, 5).map(h => `
            <div class="hist-item" style="cursor:pointer;" onclick="voirDetailHistorique('${h.id}')">
                <div style="padding-right: 30px;">
                    <strong>${h.nomProgramme}</strong><br>
                    <span style="color:#a0aec0; font-size:0.9em;">${new Date(h.date).toLocaleDateString('fr-FR')}</span>
                </div>
                <button onclick="supprimerHistorique(event, '${h.id}')" 
                        style="position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:1.1em; padding:5px;">
                    🗑️
                </button>
            </div>
        `).join('') || "<p style='font-size:0.8em; color:#a0aec0; padding:10px;'>Aucun historique.</p>";
    }

    window.supprimerHistorique = async function(event, id) {
        event.stopPropagation();
        if (confirm("Supprimer cette séance ?")) {
            await deleteDoc(doc(db, "historique_seances", id));
            showToast("Séance supprimée");
            chargerSidebar(); // Recharge tout pour mettre à jour les badges
            document.getElementById('overview-screen').style.display = 'none';
            document.getElementById('empty-state').style.display = 'block';
        }
    }

    window.voirDetailHistorique = function(id) {
        const seance = window.historiqueData.find(h => h.id === id);
        if (!seance) return;

        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('workout-view').style.display = 'none';
        const overview = document.getElementById('overview-screen');
        overview.style.display = 'block';
        
        document.getElementById('mobile-title').innerText = "Archive";
        document.getElementById('overview-title').innerText = seance.nomProgramme + " (" + new Date(seance.date).toLocaleDateString() + ")";
        document.getElementById('btn-start-workout').style.display = 'none';

        const summary = document.getElementById('exercise-list-summary');
        summary.innerHTML = seance.exercices.map(exo => {
            const seriesHTML = exo.series_faites ? exo.series_faites.map((s, i) => `
                <div class="serie-detail-row">
                    <span>Série ${i + 1}</span>
                    <strong>${s.reps} reps @ ${s.poids} kg</strong>
                </div>
            `).join('') : `
                <div style="text-align:right">
                    <span style="color:var(--primary); font-size:1em; font-weight: 800;">${exo.poids} kg</span><br>
                    <span style="font-size:0.75em; color:#718096;">${exo.reps} reps</span>
                </div>`;

            return `
            <div class="exo-row-summary" style="flex-direction: column; align-items: stretch; gap: 8px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div class="exo-info-main">
                        <strong>${exo.nom}</strong>
                        <div class="exo-details-tags">
                            <span class="tag tag-work">${exo.series} séries</span>
                            <span class="tag tag-rest" style="text-transform:none">Note: ${exo.note || "-"}</span>
                        </div>
                    </div>
                </div>
                <div style="margin-top: 5px;">${seriesHTML}</div>
            </div>`;
        }).join('');

        if(window.innerWidth <= 768) toggleSidebar(false);
    }

    async function selectProgram(id, el) {
        document.querySelectorAll('.prog-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');

        const snap = await getDoc(doc(db, "programmes", id));
        currentProg = { id: snap.id, ...snap.data() };
        currentIndex = 0;

        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('workout-view').style.display = 'none';
        document.getElementById('overview-screen').style.display = 'block';
        document.getElementById('btn-start-workout').style.display = 'block';
        document.getElementById('mobile-title').innerText = currentProg.nom;
        document.getElementById('overview-title').innerText = currentProg.nom;

        const summary = document.getElementById('exercise-list-summary');
        summary.innerHTML = currentProg.exercices.map(exo => `
            <div class="exo-row-summary">
                <div class="exo-info-main">
                    <strong>${exo.nom}</strong>
                    <div class="exo-details-tags">
                        <span class="tag tag-work">${exo.series} séries de ${exo.reps} rep</span>
                        <span class="tag tag-rest">⏱️ ${exo.repos}s repos</span>
                    </div>
                </div>
                <span style="color:var(--primary); font-size:1em; font-weight: 800;">${exo.poids} kg</span>
            </div>
        `).join('');

        if(window.innerWidth <= 768) toggleSidebar(false);
    }

    window.demarrerEntrainement = function() {
        document.getElementById('overview-screen').style.display = 'none';
        document.getElementById('workout-view').style.display = 'block';
        renderExo();
    }

    function renderExo() {
        const exo = currentProg.exercices[currentIndex];
        const totalExos = currentProg.exercices.length;
        
        document.getElementById('display-nom').innerText = exo.nom;
        document.getElementById('display-sub').innerText = `${exo.muscle} / ${exo.equipement}`;
        document.getElementById('display-rest-active').innerText = `⏱️ Repos : ${exo.repos}s`;
        document.getElementById('inp-note').value = exo.note || "";

        let seriesContainer = document.getElementById('series-container');
        let htmlSeries = `
            <div style="position: relative; padding-left: 20px;">
                <div style="position: absolute; left: 7px; top: 10px; bottom: 10px; width: 2px; background: #e2e8f0; z-index: 1;"></div>
                <div style="display: grid; grid-template-columns: 40px 1fr 1fr 50px; gap: 10px; font-weight: bold; margin-bottom: 15px; color: #718096; font-size: 0.7em; text-transform: uppercase; position: relative; z-index: 2;">
                    <span>Sér.</span><span>Reps</span><span>Poids</span><span></span>
                </div>
        `;

        for (let i = 1; i <= parseInt(exo.series); i++) {
            htmlSeries += `
                <div id="row-serie-${i}" style="display: grid; grid-template-columns: 40px 1fr 1fr 50px; gap: 10px; align-items: center; margin-bottom: 12px; background: white; padding: 10px; border-radius: 12px; border: 1px solid #edf2f7; position: relative; z-index: 2;">
                    <div id="dot-serie-${i}" style="position: absolute; left: -17px; top: 50%; transform: translateY(-50%); width: 10px; height: 10px; border-radius: 50%; background: #cbd5e0; border: 2px solid white; z-index: 3;"></div>
                    <span style="font-weight: 800; color: var(--primary); text-align: center;">${i}</span>
                    <input type="number" class="serie-reps" id="reps-${i}" value="${exo.reps}" style="width: 100%; border: 1px solid #eee; border-radius: 6px; padding: 8px; text-align: center;">
                    <input type="number" class="serie-poids" id="poids-${i}" value="${exo.poids}" step="0.5" style="width: 100%; border: 1px solid #eee; border-radius: 6px; padding: 8px; text-align: center; font-weight: bold; color: var(--primary);">
                    <button onclick="validerSerie(${i}, this)" style="background: #f8fafc; border: 1px solid #eee; color: #94a3b8; border-radius: 8px; height: 40px; cursor: pointer; font-weight: bold;">OK</button>
                </div>
            `;
        }
        htmlSeries += `</div>`;
        seriesContainer.innerHTML = htmlSeries;

        document.getElementById('progress-fill').style.width = ((currentIndex + 1) / totalExos * 100) + "%";
        document.getElementById('btn-precedent').style.visibility = currentIndex === 0 ? 'hidden' : 'visible';
        
        const isLast = currentIndex === totalExos - 1;
        document.getElementById('btn-suivant').style.display = isLast ? 'none' : 'block';
        document.getElementById('btn-passer').style.display = isLast ? 'none' : 'block';
        document.getElementById('btn-terminer').style.display = isLast ? 'block' : 'none';
    }

    window.validerSerie = async function(index, btn) {
        const row = document.getElementById(`row-serie-${index}`);
        const dot = document.getElementById(`dot-serie-${index}`);
        const pInput = document.getElementById(`poids-${index}`);
        const rInput = document.getElementById(`reps-${index}`);
        
        const pSaisi = parseFloat(pInput.value);
        const rSaisi = parseInt(rInput.value);
        const exo = currentProg.exercices[currentIndex];

        if (!exo.series_faites) exo.series_faites = [];
        exo.series_faites[index - 1] = { poids: pSaisi, reps: rSaisi };

        let color = "#16a34a"; 
        if (pSaisi < exo.poids || rSaisi < exo.reps) color = "#dc2626"; 

        row.style.borderLeft = `6px solid ${color}`;
        dot.style.background = color;
        btn.innerHTML = "✅"; btn.style.background = color; btn.style.color = "white";
        pInput.disabled = true; rInput.disabled = true; btn.onclick = null;

        if (index === parseInt(exo.series)) {
            exo.poids = pSaisi; exo.reps = rSaisi;
        }
        await quickSave();
    }

    async function quickSave() {
        if (!currentProg) return;
        const exo = currentProg.exercices[currentIndex];
        exo.note = document.getElementById('inp-note').value;
        await updateDoc(doc(db, "programmes", currentProg.id), { exercices: currentProg.exercices });
        showToast("Données synchronisées");
    }

    function showToast(text) {
        const t = document.getElementById('toast');
        t.innerText = text; t.style.opacity = 1;
        setTimeout(() => t.style.opacity = 0, 1500);
    }

    document.getElementById('btn-terminer').onclick = async () => {
        try {
            // 1. Sauvegarder dans l'historique
            await addDoc(collection(db, "historique_seances"), {
                nomProgramme: currentProg.nom,
                date: new Date().toISOString(),
                exercices: currentProg.exercices
            });

            // 2. Afficher l'écran de succès
            const workoutCard = document.getElementById('workout-card-container');
            workoutCard.innerHTML = `
                <div style="text-align: center; padding: 20px;">
                    <div style="font-size: 5em; margin-bottom: 20px;">🏆</div>
                    <h2 style="color: var(--secondary); margin-bottom: 10px;">Séance Terminée !</h2>
                    <p style="color: #718096; margin-bottom: 25px;">Excellent travail. Ton programme est marqué comme complété pour aujourd'hui.</p>
                    <button class="btn btn-primary" onclick="location.reload()" style="width: 100%;">
                        RETOUR AU DASHBOARD
                    </button>
                </div>
            `;
            
            showToast("Séance enregistrée ! 🎉");
        } catch (e) { 
            console.error(e);
            alert("Erreur lors de l'enregistrement.");
        }
    };

    document.getElementById('btn-suivant').onclick = () => { currentIndex++; renderExo(); };
    document.getElementById('btn-passer').onclick = () => { currentIndex++; renderExo(); };
    document.getElementById('btn-precedent').onclick = () => { if(currentIndex > 0) { currentIndex--; renderExo(); } };
    window.toggleSidebar = (show) => { document.getElementById('sidebar').classList.toggle('hidden', !show); };
    document.getElementById('inp-note').onblur = quickSave;

    chargerSidebar();
</script>
</body>
</html>
